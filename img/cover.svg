<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="400" viewBox="0 0 1280 400" role="img" aria-label="@vbarbarosh/dd — an abstraction for working with the mouse">
    <defs>
        <pattern id="dots" width="40" height="40" patternUnits="userSpaceOnUse">
            <circle cx="20" cy="20" r="1.5" fill="#1c2330" opacity="0.10"/>
        </pattern>
        <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
        </marker>
    </defs>

    <rect width="1280" height="400" fill="#f6f7f9"/>
    <rect width="1280" height="400" fill="url(#dots)"/>

    <!-- text block -->
    <text x="80" y="168" font-family="ui-monospace, 'SF Mono', Consolas, monospace" font-size="52" font-weight="700" fill="#1c2330">@vbarbarosh/dd</text>
    <text x="80" y="216" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="22" fill="#5b6472">An abstraction for working with the mouse.</text>

    <rect x="80" y="252" width="330" height="46" rx="8" fill="#eef1f5" stroke="#dde1e7"/>
    <text x="102" y="282" font-family="ui-monospace, 'SF Mono', Consolas, monospace" font-size="19" fill="#1c2330">npm i @vbarbarosh/dd</text>

    <!-- illustration: ghost box at press point, drag path, solid box -->
    <rect x="790" y="84" width="90" height="90" rx="8" fill="none" stroke="#5b6472" stroke-width="2" stroke-dasharray="6 6" opacity="0.65"/>
    <text x="835" y="196" font-family="ui-monospace, 'SF Mono', Consolas, monospace" font-size="15" fill="#5b6472" text-anchor="middle">x0,y0</text>

    <path d="M 892 140 Q 1000 130 1052 216" fill="none" stroke="#2563eb" stroke-width="2.5" stroke-dasharray="2 7" stroke-linecap="round" marker-end="url(#arrow)"/>
    <text x="984" y="112" font-family="ui-monospace, 'SF Mono', Consolas, monospace" font-size="15" fill="#2563eb" text-anchor="middle">dx,dy</text>

    <rect x="1030" y="226" width="90" height="90" rx="8" fill="#f88888"/>
    <rect x="1030" y="226" width="90" height="90" rx="8" fill="none" stroke="#1c2330" opacity="0.12"/>
    <text x="1075" y="277" font-family="ui-monospace, 'SF Mono', Consolas, monospace" font-size="15" fill="#1c2330" text-anchor="middle">240,140</text>

    <!-- pointer cursor -->
    <path d="M 1108 296 l 0 26 l 6 -6 l 5 11 l 6 -3 l -5 -11 l 9 -1 z" fill="#ffffff" stroke="#1c2330" stroke-width="1.5" stroke-linejoin="round"/>
</svg>
